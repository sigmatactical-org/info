{% extends "base.html" %}

{% block title %}{{ title }} — Sigma Info{% endblock %}


{% block main_class %}info-main{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row g-4">
    <aside class="col-lg-3">
      <nav class="info-nav" aria-label="Documents">
        <ul class="list-unstyled mb-0">
          {% for entry in nav %}
          <li>
            <a href="/doc/{{ entry.slug }}"{% if entry.slug == slug %} aria-current="page"{% endif %}>{{ entry.title }}</a>
          </li>
          {% endfor %}
        </ul>
      </nav>
    </aside>
    <article class="col-lg-9 info-doc">
      <h1>{{ title }}</h1>
      {{ body|safe }}
    </article>
  </div>
</div>
{% endblock %}
